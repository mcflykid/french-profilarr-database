name: HDR10 Regex
description: Détecte HDR10 dans le titre de release.
pattern: \b(HDR10)\b
tests:
  - id: 1
    input: Film.2022.MULTI.VFF.UHD.2160p.HDR10.DTS-HD.MA.x265-QTZ
    expected: true
  - id: 2
    input: Serie.S01E05.VOSTFR.WEB.1080p.HDR10.h264-FW
    expected: true
  - id: 3
    input: Film.2020.MULTI.VFF.WEB-DL.1080p.SDR.x264-AMEN
    expected: false
