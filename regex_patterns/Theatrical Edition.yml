name: Theatrical Edition
pattern: (?i)^(.*?)(\d{4})(.*?)\b(theatrical)\b
description: |-
  Mention **« Theatrical »** (cut ciné standard) doit apparaître **après l’année sur quatre chiffres** pour éviter les faux positifs lorsque ce mot fait partie du titre marchand réel placé avant l’année.
tags:
- Edition
tests:
- id: 1
  input: Movie.Name.2024.Theatrical.Cut.1080p.BluRay.x264-GROUP
  expected: true
- id: 2
  input: Theatrical.2024.1080p.BluRay.x264-GROUP
  expected: false
