name: AV1 Regex
description: Détecte AV1 dans le titre de release.
pattern: \b(AV1)\b
tests:
  - id: 1
    input: Film.2025.MULTI.VFF.UHD.2160p.WEB-DL.AV1.DDP5.1-GKS
    expected: true
  - id: 2
    input: Serie.S04E04.VOSTFR.WEB.1080p.AV1.OPUS-NEOSTARK
    expected: true
  - id: 3
    input: Film.2022.MULTI.VFF.UHD.2160p.WEB-DL.h265.EAC3.5.1-QTZ
    expected: false
