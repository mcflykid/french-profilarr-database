name: AAC
pattern: \bAAC(\b|\d)
description: |-
  **AAC**, alias **Advanced Audio Coding** (`\bAAC` puis fin de bloc ou suffixe numérique `AAC5.1`).
  Codec lossy léger très courant flux WEB télé et encodes partagés sur trackers français ; différent Dolby (`Dolby Digital`, `DD+`).
tags:
- Audio
tests:
- id: 1
  input: Movie.2024.1080p.BluRay.AAC5.1.x264-GROUP
  expected: true
- id: 2
  input: Movie.2024.1080p.BluRay.DDP5.1.x264-GROUP
  expected: false
