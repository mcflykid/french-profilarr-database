# ============================================================================
# Motif regex — Scène FR (C411 / La Cale / Gemini)
# ----------------------------------------------------------------------------
# Schéma Profilarr v1 : tests = [ {id, input, expected} ]
# ============================================================================
name: x264 4K Regex
description: Détecte x264/h264/AVC combiné à 2160p/4K/UHD dans le titre.
pattern: \b(x264|h264|AVC)\b.*\b(2160p|4K|UHD)\b|\b(2160p|4K|UHD)\b.*\b(x264|h264|AVC)\b
tests:
  - id: 1
    input: Film.2013.MULTI.VFF.UHD.BDRip.2160p.x264.DTS-HD.MA.7.1-TFA
    expected: true
  - id: 2
    input: Serie.S01E10.VOSTFR.WEB.4K.h264.EAC3-FW
    expected: true
  - id: 3
    input: Film.2021.MULTI.VFF.BDRip.1080p.x264.DTS.5.1-AMEN
    expected: false
