# ============================================================================
# Motif regex — Scène FR (C411 / La Cale / Gemini)
# ----------------------------------------------------------------------------
# Schéma Profilarr v1 : tests = [ {id, input, expected} ]
# ============================================================================
name: Repack2 Regex
description: Détecte REPACK/PROPER/RERIP niveau 2 ou V3.
pattern: \b(PROPER[ ._-]?2|REPACK[ ._-]?2|RERIP[ ._-]?2|V3)\b
tests:
  - id: 1
    input: Film.2016.MULTI.VFF.WEB-DL.REPACK.2.1080p.h264-QTZ
    expected: true
  - id: 2
    input: Serie.S02E08.VOSTFR.BluRay.V3.DTS-HD.MA.5.1.x264-FW
    expected: true
  - id: 3
    input: Film.2019.MULTI.VFF.DVDrip.REPACK.1080p.XviD-AMEN
    expected: false
