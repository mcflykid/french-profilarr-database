# =============================================================================
# Regex — Repack niveau 2 / V3
# -----------------------------------------------------------------------------
# Complète Repack1 pour versions plus « loin » dans la chaîne de corrections.
# =============================================================================
name: Repack2 Regex
description: >
  Détecte PROPER/REPACK/RERIP suivis d’un 2, ou la marque V3 (correction niveau 2). Custom format
  Repack2 avec bonus légèrement supérieur à Repack1.
pattern: \b(PROPER[ ._-]?2|REPACK[ ._-]?2|RERIP[ ._-]?2|V3)\b
# Tests : titres factices ; should_match = la regex doit matcher le titre (Profilarr / PCD).
tests:
  - title: Film.2016.MULTI.VFF.WEB-DL.REPACK.2.1080p.h264-QTZ
    type: movie
    should_match: true
    description: REPACK.2
  - title: Serie.S02E08.VOSTFR.BluRay.V3.DTS-HD.MA.5.1.x264-FW
    type: series
    should_match: true
    description: V3
  - title: Film.2019.MULTI.VFF.DVDrip.REPACK.1080p.XviD-AMEN
    type: movie
    should_match: false
    description: REPACK sans suffixe 2 ni V3
