# =============================================================================
# Regex — Repack / Proper / V2 (correction niveau 1)
# -----------------------------------------------------------------------------
# Petits bonus dans les profils pour préférer une release corrigée sans battre
# la hiérarchie langue / HDR.
# =============================================================================
name: Repack1 Regex
description: >
  Détecte PROPER, REAL PROPER, REPACK, FIX, RERIP ou V2 comme corrections de niveau 1 dans le titre.
  Utilisé par Repack1 pour un léger bonus de score.
pattern: \b(PROPER|REAL[ ._-]?PROPER|REPACK|FIX|RERIP|V2)\b
# Tests : titres factices ; should_match = la regex doit matcher le titre (Profilarr / PCD).
tests:
  - title: Film.2017.MULTI.VFF.BDRip.PROPER.1080p.x264-QTZ
    type: movie
    should_match: true
    description: PROPER explicite
  - title: Serie.S01E03.VOSTFR.WEB.REPACK.720p.h264-GKS
    type: series
    should_match: true
    description: REPACK simple
  - title: Film.2020.MULTI.VFF.NF.WEB-DL.1080p.h264-TFA
    type: movie
    should_match: false
    description: Aucun marqueur de correction niveau 1
