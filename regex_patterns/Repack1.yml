# ============================================================================
# Regex Pattern — Scène FR (C411 / La Cale / Gemini)
# ----------------------------------------------------------------------------
# Schéma Profilarr v1 : tests = [ {id, input, expected} ]
# ============================================================================
name: Repack1 Regex
description: Détecte PROPER/REPACK/RERIP/V2 et variantes de correction niveau 1.
pattern: \b(PROPER|REAL[ ._-]?PROPER|REPACK|FIX|RERIP|V2)\b
tests:
  - id: 1
    input: Film.2017.MULTI.VFF.BDRip.PROPER.1080p.x264-QTZ
    expected: true
  - id: 2
    input: Serie.S01E03.VOSTFR.WEB.REPACK.720p.h264-GKS
    expected: true
  - id: 3
    input: Film.2020.MULTI.VFF.NF.WEB-DL.1080p.h264-TFA
    expected: false
