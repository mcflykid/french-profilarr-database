name: Remux
pattern: (?i)Remux
description: >-
  Le mot **`Remux`** (insensible à la casse). Indique conteneurs **sans ré-encodage** (« copie quasi bit-à-bit » depuis Blu-ray / DVD ).
  Séparée des filtres Full Disc puisque vos profils peuvent décider différemment d’accueillir un Remux 1080p vs transcode léger équivalent bitrate.
tags:
- Codec
- h264
- h265
- Lossless
tests:
- id: 1
  input: Movie.2024.1080p.BluRay.REMUX.AVC.DTS-HD-GROUP
  expected: true
- id: 2
  input: Movie.2024.1080p.BluRay.x264-GROUP
  expected: false
