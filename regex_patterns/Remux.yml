# ============================================================================
# Regex Pattern — Scène FR (C411 / La Cale / Gemini)
# ----------------------------------------------------------------------------
# Schéma Profilarr v1 : tests = [ {id, input, expected} ]
# ============================================================================
name: Remux Regex
description: Détecte le mot Remux dans le titre de release.
pattern: \b(Remux)\b
tests:
  - id: 1
    input: Film.2018.MULTI.VFF.UHD.2160p.Bluray.Remux.DTS-X.TrueHD.7.1-FW
    expected: true
  - id: 2
    input: Serie.UK.S01.COMPLETE.BLURAY.Remux.DD5.1-GKS
    expected: true
  - id: 3
    input: Film.2022.MULTI.VFF.WEB-DL.1080p.EAC3.5.1.h264-TFA
    expected: false
