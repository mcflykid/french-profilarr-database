name: FR-Repack
pattern: (?i)\b(?!(?:proper|repack)[23]\b|(?:real[\s._-]+){1,2}proper\b)(?:real[\s._-]+){0,2}(?:repack|rerip|proper)[123]?\b
description: >
  PROPER / REPACK / RERIP / REAL simple (hors itérations 2–3 et hors chaîne REAL…PROPER,
  couvertes par FR-Repack-2 / FR-Repack-3).
tags:
- Flag
- Repack
- French
tests:
- id: 1
  input: The.Zone.of.Interest.2023.PROPER.2160p.UHD.BluRay.TrueHD.7.1.Atmos.HDR.x265-MainFrame
  expected: true
- id: 2
  input: Sonic.the.Hedgehog.3.2024.REPACK.2160p.WEB-DL.DDP5.1.Atmos.DoVi.HDR.H.265-FLUX
  expected: true
- id: 3
  input: roommate.wanted.2015.rerip.720p.bluray.x264-rusted
  expected: true
- id: 4
  input: Yo-Kai.Watch.S02E17.DUBBED.REAL.REPACK.HDTV.x264-W4F
  expected: true
- id: 5
  input: Sonic.the.Hedgehog.3.2024.REPACK3.2160p.WEB-DL.DDP5.1.Atmos.DoVi.HDR.H.265-FLUX
  expected: false
- id: 6
  input: Film.2024.MULTI.VFF.1080p.WEB-DL.x264-TEAM
  expected: false
