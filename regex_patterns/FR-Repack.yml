name: FR-Repack
pattern: (?i)\b(?:real[\s._-]+){0,2}(?:repack|rerip|proper)[123]?\b
description: Détecte en un seul motif toutes les variantes de release corrigées (PROPER,
  REPACK, RERIP, REAL PROPER, REAL REAL PROPER, REPACK2, REPACK3, etc.). Consolidation
  des Repack1 / Repack2 / Repack3 officiels Dictionarry. Propre au projet FR.
tags:
- Flag
- Repack
- French
tests:
- id: 1
  input: The.Zone.of.Interest.2023.PROPER.2160p.UHD.BluRay.TrueHD.7.1.Atmos.HDR.x265-MainFrame
  expected: true
- id: 2
  input: Sonic.the.Hedgehog.3.2024.REPACK.2160p.WEB-DL.DDP5.1.Atmos.DoVi.HDR.H.265-FLUX
  expected: true
- id: 3
  input: roommate.wanted.2015.rerip.720p.bluray.x264-rusted
  expected: true
- id: 4
  input: The.Zone.of.Interest.2023.PROPER2.2160p.UHD.BluRay.TrueHD.7.1.Atmos.HDR.x265-MainFrame
  expected: true
- id: 5
  input: Sonic.the.Hedgehog.3.2024.REPACK3.2160p.WEB-DL.DDP5.1.Atmos.DoVi.HDR.H.265-FLUX
  expected: true
- id: 6
  input: Yo-Kai.Watch.S02E17.DUBBED.REAL.REPACK.HDTV.x264-W4F
  expected: true
- id: 7
  input: Film.2024.MULTI.VFF.1080p.WEB-DL.x264-TEAM
  expected: false
- id: 8
  input: Serie.S02E01.VOSTFR.WEB.1080p.h264-FW
  expected: false
