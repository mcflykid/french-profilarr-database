name: IMAX Enhanced
pattern: ^(?=.*\b((DSNP|Disney\+|BC|B?CORE)(?=.?web.?(dl|rip)\b)))(?=.*\b((?<!NON.?)IMAX(.?Enhanced)?)\b)
description: 'Matches IMAX releases from specific digital sources.


  - Checks for WEBs from `Disney+` or `Bravia Core`

  - Ensures "IMAX" appears (with optional "Enhanced" suffix) but not when preceded by "NON"'
tags:
- Enhancement
- Aspect Ratio
tests:
- id: 1
  input: Movie.2024.DSNP.WEB-DL.IMAX.1080p.x264-GROUP
  expected: true
- id: 2
  input: Movie.2024.DSNP.WEB-DL.1080p.x264-GROUP
  expected: false
