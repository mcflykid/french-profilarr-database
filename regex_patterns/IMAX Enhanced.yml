name: IMAX Enhanced
pattern: (?i)^(?=.*\b((DSNP|Disney\+|BC|B?CORE)(?=.?web.?(dl|rip)\b)))(?=.*\b((?<!NON.?)IMAX(.?Enhanced)?)\b)
description: |-
  **IMAX Enhanced** pour WEB issus de **Disney+** (tags **DSNP**, **Disney+**, etc.) ou **Bravia Core** (**BC** / **CORE**),
  avec mention **IMAX** (suffixe Enhanced optionnel), en excluant les variantes précédées de **« NON‑IMAX »** selon lookahead du motif projet.
tags:
- Enhancement
- Aspect Ratio
tests:
- id: 1
  input: Movie.2024.DSNP.WEB-DL.IMAX.1080p.x264-GROUP
  expected: true
- id: 2
  input: Movie.2024.DSNP.WEB-DL.1080p.x264-GROUP
  expected: false
