name: FR-Regex-Streamers-Premium
pattern: '(?:\b(?:NF|Netflix)\b|\b(?:AMZN|(?:AMAZON)(?=\s*.(?:WEB-?DL|WEBRIP)))\b|\b(?:dsnp|dsny(?:p)?|disney\+)\s*\b|\b(?:ATVP|ATV|APTV|Apple TV\+)\s*\b|\b(?:HMAX|HBOM|(?:HBO[ ._-]?MAX)(?=\s*.(?:WEB-?DL|WEBRIP)))\b|\b(?:(?<!hbo[ ._-])max)\b(?=[ ._-]web[ ._-]?(?:dl|rip)\b)|\[(?:MAX)\b|\b(?:MAX)\]|\b(?:PMTP|Paramount Plus)\b)'
description: Regroupe les motifs « streamers premium » (**Netflix**, **Prime Video**, **Disney+**, **Apple TV+**, **HBO Max / Max**, **Paramount+**) en une seule regex projet — évite huit motifs séparés. Comportement repris des modèles **Dictionarry** d’origine.
tags:
- Streaming Service
- French
tests:
- id: 1
  input: The.Roast.of.Tom.Brady.2024.1080p.NF.WEB-DL.DDP5.1.H.264-NTb
  expected: true
- id: 2
  input: Men in Black 1997 2160p Apple TV+ WEB-DL DDP 5 1 Atmos DV H 265-CHDWEB
  expected: true
- id: 3
  input: Gladiator 2000 Paramount Reissue Extended Cut 1080p BluRay REMUX-FraMeSToR
  expected: false
