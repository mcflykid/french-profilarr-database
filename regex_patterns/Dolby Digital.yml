name: Dolby Digital
pattern: \bDD[^a-z+]|(?<!e)ac3
description: >-
  **Dolby Digital** « classique » : alias **`DD` (hors familles `DD+`)** ou encore **`AC3`** / **`ac3`** selon motifs regex projet, distinct de **E‑AC‑3** (**Dolby Digital +**) et des flux lossless Dolby.
tags:
- Audio
tests:
- id: 1
  input: Un-Ex You 2025 1080p NF WEB-DL DD 5.1 H.264-FLUX
  expected: true
- id: 2
  input: Un-Ex You 2025 1080p NF WEB-DL DD+ 5.1 H.264-FLUX
  expected: false
