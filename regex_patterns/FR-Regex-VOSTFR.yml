# ============================================================================
# Regex Pattern — Scène FR (C411 / La Cale / Gemini)
# ----------------------------------------------------------------------------
# Schéma Profilarr v1 : tests = [ {id, input, expected} ]
# ============================================================================
name: FR-Regex-VOSTFR
description: Détecte VOSTFR ou SUBFRENCH dans le titre de release.
pattern: \b(VOSTFR|SUBFRENCH)\b
tests:
  - id: 1
    input: Film.US.2023.VOSTFR.WEB-DL.1080p.EAC3.5.1.h264-BOUBA
    expected: true
  - id: 2
    input: MiniSerie.S01.SUBFRENCH.BluRay.720p.DD5.1.x264-TLC
    expected: true
  - id: 3
    input: Film.2024.MULTI.VFF.UHD.2160p.x265-QTZ
    expected: false
