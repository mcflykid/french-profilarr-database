name: DTS-HD MA
pattern: (?i)\b(dts[-_. ]?(ma|hd([-_. ]?ma)?|xll))(\b|\d)
description: >-
  **DTS‑HD Master Audio** : famille **MA** / **`DTS‑HD MA`** / **`XLL`** (sans perte) distincte du **DTS:X** et du **DTS‑HRA**. Très fréquent sur remux Blu-ray / UHD et certains flux WEB premium.
tags:
- Audio
tests:
- id: 1
  input: Film.DTS-HD.MA.5.1.720p.BluRay.x264-GROUP
  expected: true
- id: 2
  input: Film.DTS-X.7.1.720p.BluRay.x264-GROUP
  expected: false
