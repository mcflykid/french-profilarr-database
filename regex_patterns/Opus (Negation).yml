name: Opus (Negation)
pattern: (?<=^|[\s.-])OPUS\b
description: Exclut le groupe « OPUS » en tant que release_group pour éviter les faux
  positifs lorsque « OPUS » désigne le codec audio dans le titre.
tags:
- Release Group
- Audio
tests:
- id: 1
  input: The Booksellers 2020 1080p WEB-DL DD+ 2.0 H.264-OPUS
  expected: true
- id: 2
  input: Convicted 1950 1080p BluRay Opus 1.0 x264-MiRAGE
  expected: false
