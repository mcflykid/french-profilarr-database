# ============================================================================
# Motif regex — Scène FR (C411 / La Cale / Gemini)
# ----------------------------------------------------------------------------
# Schéma Profilarr v1 : tests = [ {id, input, expected} ]
# ============================================================================
name: Full Disc Regex
description: Détecte ISO, BDMV ou VIDEO_TS dans le titre de release.
pattern: \b(ISO|BDMV|VIDEO_TS)\b
tests:
  - id: 1
    input: Film.2007.MULTI.VFF.COMPLETE.BLURAY.VIDEO_TS.PAL-TLC
    expected: true
  - id: 2
    input: Jeu.2011.MULTI.FULL.ISO.COMPLETE-LOST
    expected: true
  - id: 3
    input: Film.2024.MULTI.VFF.mkv.BDRip.1080p.x264-QTZ
    expected: false
