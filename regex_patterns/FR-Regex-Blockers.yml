# ============================================================================
# Motif regex — Scène FR (C411 / La Cale / Gemini)
# ----------------------------------------------------------------------------
# Schéma Profilarr v1 : tests = [ {id, input, expected} ]
# ============================================================================
name: FR-Regex-Blockers
description: Détecte les groupes blacklistés et les incohérences techniques majeures selon la charte C411.
pattern: (?i)\b(k0RE|Firesoul64|Wawacity)\b|\b(NVENC|QSV|AMF)\b|(?=.*\b(REMUX|BDMV|ISO)\b)(?=.*\b(x26[45]|h26[45])\b)
tests:
  - id: 1
    input: Film.2015.FRENCH.BDRip.x264-k0RE
    expected: true
  - id: 2
    input: Pack.Serie.VOSTFR.x264-Wawacity
    expected: true
  - id: 3
    input: Film.2023.MULTI.VFF.UHD.2160p.DTS-X.x265-TFA
    expected: false
  - id: 4
    input: WALL.E.2008.MULTI.VFF.2160p.UHD.BluRay.REMUX.DV.HDR10PLUS.TrueHD.7.1.x265-NOTAG
    expected: true
  - id: 5
    input: WALL.E.2008.MULTI.VFF.2160p.UHD.BluRay.REMUX.DV.HDR10PLUS.TrueHD.7.1.HEVC-NOTAG
    expected: false
  - id: 6
    input: Film.2024.MULTI.VFF.1080p.WEBRip.H264.NVENC-TEAM
    expected: true
  - id: 7
    input: Film.2024.MULTI.VFF.1080p.WEBRip.H264-TEAM
    expected: false
  - id: 8
    input: WALL.E.2008.MULTI.VFF.1080p.BluRay.ISO.DTS.5.1.H264-NOTAG
    expected: true
