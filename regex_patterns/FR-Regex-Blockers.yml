# ============================================================================
# Regex Pattern — Scène FR (C411 / La Cale / Gemini)
# ----------------------------------------------------------------------------
# Schéma Profilarr v1 : tests = [ {id, input, expected} ]
# ============================================================================
name: FR-Regex-Blockers
description: Détecte les groupes blacklistés par la politique du dépôt.
pattern: \b(k0RE|Firesoul64|Wawacity)\b
tests:
  - id: 1
    input: Film.2015.FRENCH.BDRip.x264-k0RE
    expected: true
  - id: 2
    input: Pack.Serie.VOSTFR.x264-Wawacity
    expected: true
  - id: 3
    input: Film.2023.MULTI.VFF.UHD.2160p.DTS-X.x265-TFA
    expected: false
