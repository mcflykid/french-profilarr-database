# =============================================================================
# Regex — groupes / tags bannis (charte FR, trackers privés)
# -----------------------------------------------------------------------------
# Liste indicative à étendre selon les règles La Cale / Gemini / C411. Toute
# occurrence dans le titre déclenche le custom format FR-Blockers (score fortement négatif).
# =============================================================================
name: FR-Regex-Blockers
description: >
  Détecte des noms de groupes ou tags explicitement indésirables pour ce dépôt (qualité seeding,
  respect charte). Mettre à jour la liste en accord avec votre tracker ; chaque ajout doit être
  documenté dans le commit pour traçabilité.
pattern: \b(k0RE|Firesoul64|Wawacity)\b
# Tests : titres factices ; should_match = la regex doit matcher le titre (Profilarr / PCD).
tests:
  - title: Film.2015.FRENCH.BDRip.x264-k0RE
    type: movie
    should_match: true
    description: Groupe k0RE en fin de titre
  - title: Pack.Serie.VOSTFR.x264-Wawacity
    type: series
    should_match: true
    description: Wawacity dans le titre
  - title: Film.2023.MULTI.VFF.UHD.2160p.DTS-X.x265-TFA
    type: movie
    should_match: false
    description: Release propre sans groupe listé
