name: Dolby Vision
pattern: (?i)\b(dv(?![ .](HLG|SDR))|dovi|dolby[ .]?vision)\b
description: >-
  **Dolby Vision** (« DV », **DoVi**, **Dolby.Vision**) : métadonnées dynamiques HDR sur scène/frame. Le motif évite DV accolé trivialement à
  **HLG / SDR isolé** (« `(?![ .](HLG|SDR))` » après `DV`) pour ne pas confondre profils Dolby avec hybrides broadcast HLG domestiques anciens téléviseurs.
tags:
- Enhancement
- Colour Grade
- HDR
tests:
- id: 1
  input: Film.2024.2160p.UHD.BluRay.Dolby.Vision.HDR.x265-GROUP
  expected: true
- id: 2
  input: Film.2024.2160p.UHD.BluRay.DV.HLG.HDR.x265-GROUP
  expected: false
