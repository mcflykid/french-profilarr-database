name: Opus
pattern: \bOPUS(\b|\d)(?!.*[ ._-](\d{3,4}p))
description: >-
  **Opus** dans le titre, avec lookahead négatif **empêchant** qu’un segment **`XXXp`** (résolution) apparaisse **plus loin dans la même chaîne après `OPUS`** — ancien garde‑fou Dictionarry contre les collisions avec des noms de groupe ou artefacts de titre mal ordonnés.
tags:
- Audio
tests:
- id: 1
  input: Film.2024.OPUS.2.0.WEB-DL.x264-GROUP
  expected: true
- id: 2
  input: Film.2024.OPUS.1080p.WEB-DL.x264-GROUP
  expected: false
