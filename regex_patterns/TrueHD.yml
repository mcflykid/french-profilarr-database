name: TrueHD
pattern: True[ .-]?HD[ .-]?
description: >-
  **Dolby TrueHD** (« **True‑HD** » selon typo) — audio **sans perte** Dolby issu très souvent Blu-ray/remux téléchargées privées ; la piste immersive **Atmos** est généralement gérée séparément par le CF **Atmos** via `FR-Regex-Atmos-Bundle`.
tags:
- Audio
- Lossless
tests:
- id: 1
  input: Film.2024.2160p.UHD.BluRay.TrueHD.7.1.Atmos.x265-GROUP
  expected: true
- id: 2
  input: Film.2024.1080p.BluRay.DDP5.1.x264-GROUP
  expected: false
