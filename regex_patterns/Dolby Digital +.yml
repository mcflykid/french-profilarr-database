name: Dolby Digital +
pattern: \bDD[P+]|\b(e[-_. ]?ac3)\b
description: >-
  **Dolby Digital Plus** (**DD+**, **E‑AC‑3**) : alias **`DDP`** ou **`e.ac3`** (séparateurs `.`/`_`/espaces tolérés). Distinct du **Dolby Digital** « AC‑3 » classique (voir fichier `Dolby Digital.yml` du dossier regex).
tags:
- Audio
tests:
- id: 1
  input: Un-Ex You 2025 1080p NF WEB-DL DD 5.1 H.264-FLUX
  expected: false
- id: 2
  input: Un-Ex You 2025 1080p NF WEB-DL DD+ 5.1 H.264-FLUX
  expected: true
