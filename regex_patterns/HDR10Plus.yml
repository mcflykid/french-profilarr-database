# ============================================================================
# Regex Pattern — Scène FR (C411 / La Cale / Gemini)
# ----------------------------------------------------------------------------
# Schéma Profilarr v1 : tests = [ {id, input, expected} ]
# ============================================================================
name: HDR10+ Regex
description: Détecte HDR10+ ou HDR10Plus dans le titre de release.
pattern: \b(HDR10(Plus|\+))\b
tests:
  - id: 1
    input: Film.2023.MULTI.VFF.UHD.2160p.HDR10Plus.DTS-X.x265-TFA
    expected: true
  - id: 2
    input: Serie.S02E02.VOSTFR.WEBRip.1080p.HDR10+.EAC3.h264-GKS
    expected: true
  - id: 3
    input: Film.2019.MULTI.VFF.Bluray.1080p.HDR10.DTS.5.1.x264-OZEF
    expected: false
