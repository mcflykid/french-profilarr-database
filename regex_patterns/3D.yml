name: 3D
pattern: (?<=\b[12]\d{3}\b).*\b((bluray|bd)?3d|sbs|half[ .-]ou|half[ .-]sbs)\b
  Repère marqueurs **`bluray3d` / `bd3d`**, **`sbs`** (côte‑à‑côte) et **`half‑ou` ou `half‑sbs`** (séparés par `.`, `-` ou espace après un bloc année quatre chiffres) — utile pour exclure ou pénaliser fortement vos imports 1080p/4k si vous n’utilisez pas la 3D passif/actif domestique.
tags:
- Enhancement
- Banned
tests:
- id: 1
  input: Movie.2024.1080p.bluray3d.x264-GROUP
  expected: true
- id: 2
  input: Movie.2024.1080p.BluRay.x264-GROUP
  expected: false
