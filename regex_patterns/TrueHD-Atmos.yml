# ============================================================================
# Motif regex — Scène FR (C411 / La Cale / Gemini)
# ----------------------------------------------------------------------------
# Schéma Profilarr v1 : tests = [ {id, input, expected} ]
# ============================================================================
name: TrueHD Atmos Regex
description: Détecte les mentions TrueHD Atmos (ordre direct ou inversé).
pattern: \b(TrueHD[ ._-]?Atmos|Atmos[ ._-]?TrueHD)\b
tests:
  - id: 1
    input: Film.2021.MULTI.VFF.UHD.Bluray.TrueHD.Atmos.7.1.x265-QTZ
    expected: true
  - id: 2
    input: Serie.S02E03.Atmos.TrueHD.WEB-DL.1080p.h264-FW
    expected: true
  - id: 3
    input: Film.2019.MULTI.VFF.WEB.1080p.DDP5.1.h264-AMEN
    expected: false
