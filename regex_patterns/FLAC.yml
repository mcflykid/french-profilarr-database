name: FLAC
pattern: \bFLAC(\b|\d)
description: >-
  **FLAC sans perte** annoncée sur la ligne release (`FLAC`, profils **`FLAC24`**, …). À distinguer du **PCM/LPCM** non compressés (`PCM.yml`).
tags:
- Audio
tests:
- id: 1
  input: Album.FLAC.24bit.LOSSLESS-GROUP
  expected: true
- id: 2
  input: Film.AAC.5.1.1080p.BluRay.x264-GROUP
  expected: false
