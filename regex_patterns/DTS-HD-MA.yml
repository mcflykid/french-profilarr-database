# ============================================================================
# Motif regex — Scène FR (C411 / La Cale / Gemini)
# ----------------------------------------------------------------------------
# Schéma Profilarr v1 : tests = [ {id, input, expected} ]
# ============================================================================
name: DTS-HD MA Regex
description: Détecte DTS-HD MA (ou DTS-HD selon variante du titre).
pattern: \b(DTS[ ._-]?HD([ ._-]?MA)?)\b
tests:
  - id: 1
    input: Film.2019.MULTI.VFF.UHD.2160p.DTS-HD.MA.7.1.x265-FW
    expected: true
  - id: 2
    input: Serie.S02E11.VOSTFR.BluRay.1080p.DTS-HD.h264-TFA
    expected: true
  - id: 3
    input: Film.2024.MULTI.VFF.WEB-DL.AC3.5.1.h264-GKS
    expected: false
