# ============================================================================
# Regex Pattern — Scène FR (C411 / La Cale / Gemini)
# ----------------------------------------------------------------------------
# Schéma Profilarr v1 : tests = [ {id, input, expected} ]
# ============================================================================
name: Repack3 Regex
description: Détecte REPACK/PROPER/RERIP niveau 3 ou V4.
pattern: \b(PROPER[ ._-]?3|REPACK[ ._-]?3|RERIP[ ._-]?3|V4)\b
tests:
  - id: 1
    input: Film.2015.MULTI.VFF.BDRip.V4.DTS.5.1.x264-OZEF
    expected: true
  - id: 2
    input: Serie.S03E03.VOSTFR.WEB.REPACK.3.720p.x264-TMB
    expected: true
  - id: 3
    input: Documentaire.2014.MULTI.VFF.TVrip.REPACK.1080p.h264-TSR
    expected: false
