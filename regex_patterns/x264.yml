name: x264
pattern: ^(?!.*(?i:remux)).*([xh](\.?264)|DVDRip)
description: >-
  **x264 / H.264 (AVC)** : encodeur open-source très répandu pour fichiers au format MPEG-4 AVC. Le motif couvre **`x264`**, **`h264`**, **`H.264`**, ainsi que **`DVDRip`** (anciens téléchargements DVD → AVC SD) tout en **excluant explicitement tout titre contenant « remux »** pour ne pas doubler avec les lignes Blu-ray natives.
tags:
- Encoder
- Codec
tests:
- id: 1
  input: Dan Da Dan AKA Dandadan S01E10 1080p CR WEB-DL AAC 2.0 x264-SubsPlease
  expected: true
- id: 2
  input: Life of Pi 2012 1080p BluRay x264-SPARKS
  expected: true
- id: 3
  input: _Summer S00 JAPANESE 480p DVDRip DD 2.0 x264-Tsundere
  expected: true
