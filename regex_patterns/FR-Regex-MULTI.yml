# ============================================================================
# Regex Pattern — Scène FR (C411 / La Cale / Gemini)
# ----------------------------------------------------------------------------
# Schéma Profilarr v1 : tests = [ {id, input, expected} ]
# ============================================================================
name: FR-Regex-MULTI
description: Détecte le tag MULTI (plusieurs langues audio) dans le titre.
pattern: \b(MULTI)\b
tests:
  - id: 1
    input: Film.2022.MULTI.VFF.UHD.2160p.WEB-DL.h265-GKS
    expected: true
  - id: 2
    input: Serie.S02E01.FRENCH.MULTI.1080p.WEB.h264-QTZ
    expected: true
  - id: 3
    input: Film.2019.VFF.BDRip.1080p.x264-OZEF
    expected: false
