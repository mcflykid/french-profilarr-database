name: DTS-HD HRA ES
pattern: dts[-. ]?(es|(hd[. ]?)?(hr|hi))
description: |-
  Couverture combinée **`DTS-ES`** et variantes **high resolution (`HR`, `HI`)** du DTS classique lorsque titreurs anciens mélangent abréviations ; aide les autres CF Dolby/DTS à s’exclure sans doublons.
tags:
- Audio
tests:
- id: 1
  input: Film.dts.es.5.1.720p.BluRay.x264-GROUP
  expected: true
- id: 2
  input: Movie.DTS-X.7.1.1080p.BluRay.x264-GROUP
  expected: false
