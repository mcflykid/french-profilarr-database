name: Basic HDR Formats
pattern: (?:(?<=^(?!.*\b(HLG|PQ|SDR)(\b|\d)).*?)HDR)|\b(dv(?![ .](HLG|SDR))|dovi|dolby[ .]?vision)\b
description: >-
  Détecte la présence littérale **HDR dans le titre** (hors contextes parasites **HLG / PQ / SDR**
  combinés trompeusement), ou encore les marqueurs **DV / Dolby Vision** dans la même logique projet.
tags:
- Enhancement
- Colour Grade
- HDR
tests:
- id: 1
  input: Film.2024.Dolby.Vision.HDR10.x265-GROUP
  expected: true
- id: 2
  input: Release.1080p.HDR.BluRay.x264-GROUP
  expected: true
- id: 3
  input: Release HLG HDR x264-GROUP
  expected: false
