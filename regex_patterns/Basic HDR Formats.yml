name: Basic HDR Formats
pattern: (?:(?<=^(?!.*\b(HLG|PQ|SDR)(\b|\d)).*?)HDR)|\b(dv(?![ .](HLG|SDR))|dovi|dolby[ .]?vision)\b
description: Matches Dolby Vision OR HDR10. Needed to better match UHD Blurays
tags:
- Enhancement
- Colour Grade
- HDR
tests:
- id: 1
  input: Film.2024.Dolby.Vision.HDR10.x265-GROUP
  expected: true
- id: 2
  input: Release.1080p.HDR.BluRay.x264-GROUP
  expected: true
- id: 3
  input: Release HLG HDR x264-GROUP
  expected: false
