# ============================================================================
# Regex Pattern — Scène FR (C411 / La Cale / Gemini)
# ----------------------------------------------------------------------------
# Schéma Profilarr v1 : tests = [ {id, input, expected} ]
# ============================================================================
name: FR-Regex-VFF
description: Détecte VFF ou TRUEFRENCH dans le titre de release (scène FR stricte).
pattern: \b(VFF|TRUEFRENCH)\b
tests:
  - id: 1
    input: Film.2023.MULTI.VFF.Bluray.1080p.DTS-HD.MA.5.1.x264-TFA
    expected: true
  - id: 2
    input: Serie.S01E04.TRUEFRENCH.WEB.720p.x264-FW
    expected: true
  - id: 3
    input: Film.2020.VFQ.WEB-DL.1080p.h264-AMEN
    expected: false
