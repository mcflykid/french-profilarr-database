# ============================================================================
# Définitions de taille par qualité (Radarr / Sonarr)
# ----------------------------------------------------------------------------
# Valeurs alignées sur les limites API ARR pour éviter les erreurs de sync.
# Règle appliquée : min <= preferred <= max, avec bornes max ARR.
#
# **Radarr MB/minute** — sur min / preferred / max, **2000 = plafond « quasi illimité »**
# pour la taille maximale préférée, **pas** une valeur acceptable pour « min ». Mettre **min:
# 2000** sur du WEB/UHD équivalait à exiger ~300+ Go pour un long-métrage (2000 × durée).
#
# Séries WEB 1080p HEVC « scène » (ex. BONBON : ~548 MiB / ~43 min d’épisode,
# soit ~13 MiB/min) : preferred WEBDL/WEBRip 1080p abaissé pour ne pas
# surestimer les très gros épisodes lors du classement intra-qualité.
#
# Animé : même fichier `sonarr` sert dramas et épisodes anime ; durée épisode courte
# (souvent ~24 min) donne déjà un poids fichier plus léger avec la même valeur
# MB/min Sonarr. Les plages Anime distinctes sont dans Sonarr Réglages > Qualité —
# onglet **Anime** (non synchronisable séparément par Profilarr v1 avec ce YAML).
# ============================================================================
qualityDefinitions:
  radarr:
    BR-DISK:
      max: 2000
      min: 0
      preferred: 1990
    Bluray-1080p:
      max: 2000
      min: 1200
      preferred: 1800
