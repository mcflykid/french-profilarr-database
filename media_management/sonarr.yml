rename_episodes: true
replace_illegal_characters: true
colon_replacement_format: dash
series_folder_format: "{Series Title} ({Series Year}) {tvdb-{TvdbId}}"
season_folder_format: "Season {season:00}"
standard_episode_format: "{Series Title} - S{season:00}E{episode:00} - {Episode Title} [{Custom_Format_List} {Quality_Full} {Media_Info_VideoCodec} {Media_Info_AudioCodec} {Media_Info_AudioChannels}]"
daily_episode_format: "{Series Title} - {Air-Date} - {Episode Title} [{Custom_Format_List} {Quality_Full} {Media_Info_VideoCodec} {Media_Info_AudioCodec} {Media_Info_AudioChannels}]"
anime_episode_format: "{Series Title} - S{season:00}E{episode:00} - {absolute:000} - {Episode Title} [{Custom_Format_List} {Quality_Full} {Media_Info_VideoCodec} {Media_Info_AudioCodec} {Media_Info_AudioChannels}]"
