name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: PCD v2 + métadonnées FR
        run: python3 scripts/verify_pcd_v2.py

      - name: Regex
        run: python3 scripts/validate_regex_ops.py

      - name: Scores attendus (politique FR)
        run: python3 scripts/verify_expected_scores.py

      - name: Tests équipes (FR-Team-*)
        run: python3 scripts/verify_team_tests.py

      - name: Parité scores inter-profils
        run: python3 scripts/verify_profile_scores.py
