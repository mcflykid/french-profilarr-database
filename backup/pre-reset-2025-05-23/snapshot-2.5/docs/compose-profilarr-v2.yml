# Profilarr v2 — exemple Compose (Dictionarry Hub)
# PAT GitHub et compte Radarr/Sonarr : configurés dans l’UI, pas dans ce fichier.
# Appdata v1 incompatible : sauvegarder l’ancien dossier puis /config vierge.

services:
  profilarr:
    image: ghcr.io/dictionarry-hub/profilarr:latest
    container_name: profilarr
    restart: unless-stopped
    ports:
      - "${PROFILARR_PORT:-6868}:6868"
    volumes:
      - ${DOCKERDIR}/appdata/profilarr:/config
    tmpfs:
      - /app/.cache
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Paris}
      - PROFILARR_PARSER_HOST=parser
    depends_on:
      - parser

  parser:
    image: ghcr.io/dictionarry-hub/profilarr-parser:latest
    container_name: profilarr-parser
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
