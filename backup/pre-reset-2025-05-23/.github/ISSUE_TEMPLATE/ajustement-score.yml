name: Ajustement de score
description: Proposer un changement de score sur un profil FR-*
title: "[score] "
labels: ["enhancement"]
body:
  - type: input
    id: cf
    attributes:
      label: Custom format
    validations:
      required: true
  - type: dropdown
    id: profile
    attributes:
      label: Profil
      options:
        - FR-Films-4K
        - FR-Films-1080p
        - FR-Films-720p
        - FR-Films-Any
        - FR-Series-4K
        - FR-Series-1080p
        - FR-Series-720p
        - FR-Anime-4K
        - FR-Anime-1080p
        - FR-Anime-720p
        - Tous les profils
  - type: input
    id: current_score
    attributes:
      label: Score actuel (si connu)
  - type: input
    id: proposed_score
    attributes:
      label: Score proposé
  - type: textarea
    id: justification
    attributes:
      label: Justification (release exemple, concurrence avec autre CF)
