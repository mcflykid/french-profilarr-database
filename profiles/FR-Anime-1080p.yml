# ============================================================================
# Sonarr — Animé / animation 1080p (charte FR type C411 : La Cale, Gemini)
# ----------------------------------------------------------------------------
# Dérivé FR-Series-1080p. Épisodes ~24 min versus drama ~43 min : même Mb/min sous
# Sonarr, total fichier plus petit au débit constant. Définitions de taille : voir
# `quality_definitions.yml` (shared) puis, si nécessaire, l’onglet qualité Anime
# dans Sonarr pour des encodages BD/WEB très compacts par épisode.
# ============================================================================
name: FR-Anime-1080p
description: >
  Profil Sonarr 1080p pour animés (type Anime Sonarr) sur trackers type C411
  (La Cale, Gemini). Langue FR, équipes sur quatre paliers, audio premium, codecs
  efficient incl. x265/h265, HDR léger toléré. Inclut HDTV-1080p. Bonus Season Pack.
  Bloque Remux, Full Disc, AV1, Upscaled.
tags:
- 1080p
- anime
- French
upgradesAllowed: true
minCustomFormatScore: 20000
upgradeUntilScore: 888888
minScoreIncrement: 1
