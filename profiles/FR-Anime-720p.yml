# ============================================================================
# Sonarr — Animé / animation 720p (charte FR type C411 : La Cale, Gemini)
# ----------------------------------------------------------------------------
# Dérivé du profil série 720p. Les épisodes anime sont souvent courts (~24 min
# nominaux) ⇒ fichiers totals plus légers pour un même Mb/min sous Sonarr.
# Les définitions de taille partagent `media_management/quality_definitions.yml`
# (clé sonarr:) ; si une anime BD compacte est rejetée par la taille, ajuster aussi
# les Définitions de qualité **Anime** dans Sonarr (réglages instance), distinctes
# des séries drama.
# ============================================================================
name: FR-Anime-720p
description: >
  Profil Sonarr 720p pour animés sur trackers francophones type C411 (La Cale, Gemini).
  À utiliser lorsque la série Sonarr est de type « Anime ». Priorité langue FR, équipes sur
  quatre paliers, audio modéré, codec efficient. Inclut HDTV-720p. Bloque Remux, Full Disc,
  AV1, Upscaled.
tags:
- 720p
- anime
- French
upgradesAllowed: true
minCustomFormatScore: 20000
upgradeUntilScore: 888888
minScoreIncrement: 1
custom_formats:
# === Langue ===
- name: FR-MULTI-VF2
  score: 100000
- name: FR-MULTI-VFF
  score: 90000
- name: FR-VF2
  score: 70000
- name: FR-VFF
  score: 60000
- name: FR-VOSTFR
  score: 20000

# === Équipes FR (quatre paliers) ===
- name: FR-Tier-01
  score: 2400
- name: FR-Tier-02
  score: 2000
- name: FR-Tier-03
  score: 1600
- name: FR-Tier-04
  score: 1000

# === Audio ===
- name: Atmos
  score: 200
- name: TrueHD
  score: 180
- name: DTS-X
  score: 180
- name: DTS-HD MA
  score: 150
- name: Dolby Digital +
  score: 100
- name: Dolby Digital
  score: 60
- name: AAC
  score: 40
- name: FLAC
  score: 130

# === Codec ===
- name: x265
  score: 220
- name: h265
  score: 200
- name: Xvid
  score: -200

# === Source / saison ===
- name: Season Pack
  score: 50

# === Streamers (consolidés) ===

- name: FR-Streamer-Premium
  score: 50
- name: FR-Streamer-Standard
  score: 30

# === HDLight (Bluray allégé scène FR) ===
- name: FR-HDLight
  score: 50

# === Exclusions ===
- name: FR-Blockers
  score: -999999
- name: Remux
  score: -999999
- name: Full Disc
  score: -999999
- name: AV1
  score: -999999
- name: Upscaled
  score: -999999

# === Repack ===
- name: FR-Repack-3
  score: 110
- name: FR-Repack-2
  score: 75
- name: FR-Repack
  score: 50

qualities:
- id: -2
  name: 720p Quality
  qualities:
  - id: 11
    name: Bluray-720p
  - id: 5
    name: WEBDL-720p
  - id: 6
    name: WEBRip-720p
  - id: 1
    name: HDTV-720p
upgrade_until:
  id: -2
  name: 720p Quality
language: any
