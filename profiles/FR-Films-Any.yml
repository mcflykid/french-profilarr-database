# ============================================================================
# Radarr — Films « Any » qualité (scène FR, La Cale / Gemini)
# ----------------------------------------------------------------------------
# Profil volontairement permissif sur la RÉSOLUTION : SD à Raw-HD pour saisir
# tôt une release FR, puis laisser Radarr upgrader via les scores custom formats.
# Bloque toujours les groupes blacklistés (FR-Blockers) et l’AV1 (compat).
# Pas de pénalité Remux / Full Disc ici : utile si vous acceptez ces sources
# sur ce profil uniquement (ex. bibliothèque mixte).
# ============================================================================
name: FR-Films-Any
description: >
  Profil Radarr « toute qualité » pour films sur trackers francophones (La Cale, Gemini).
  Garde la hiérarchie langue FR + teams + repacks + bonus audio lossless, mais n’impose pas de
  résolution cible (WEB, HDTV, DVD, etc.). Ne bloque pas Remux ni Full Disc sur ce profil ;
  bloque FR-Blockers et AV1.
tags:
- any
- French
upgradesAllowed: true
minCustomFormatScore: 20000
upgradeUntilScore: 888888
minScoreIncrement: 1
custom_formats:
# --- Langue ---
- name: FR-MULTI-VF2
  score: 60000
- name: FR-MULTI-VFF
  score: 50000
- name: FR-VF2
  score: 40000
- name: FR-VFF
  score: 30000
- name: FR-VOSTFR
  score: 10000
# --- Teams FR ---
- name: FR-Tier-01
  score: 1800
- name: FR-Tier-02
  score: 1700
# --- Audio (bonus si la release annonce du lossless dans le titre) ---
- name: TrueHD Atmos
  score: 1000
- name: DTS:X
  score: 1000
- name: TrueHD
  score: 900
- name: DTS-HD MA
  score: 900
# --- Repacks ---
- name: Repack3
  score: 8
- name: Repack2
  score: 7
- name: Repack1
  score: 6
# --- Exclusions minimales (pas de Remux / Full Disc ici) ---
- name: FR-Blockers
  score: -999999
- name: AV1
  score: -999999
qualities:
- id: -5
  name: Any Quality
  qualities:
  - id: 0
    name: Unknown
  - id: 1
    name: SDTV
  - id: 2
    name: DVD
  - id: 3
    name: WEBDL-480p
  - id: 8
    name: HDTV-720p
  - id: 9
    name: HDTV-1080p
  - id: 10
    name: Raw-HD
upgrade_until:
  id: -5
  name: Any Quality
language: any
