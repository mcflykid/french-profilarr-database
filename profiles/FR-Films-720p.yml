# =============================================================================
# Radarr — Films 720p (scène FR, La Cale / Gemini, logique type C411)
# -----------------------------------------------------------------------------
# Variante allégée pour flux 720p : mêmes priorités linguistiques et teams que
# le 1080p, mais sans bloquer « Full Disc » (souvent absent des flux 720p).
# Remux et AV1 restent pénalisés (poids / compat).
# =============================================================================
name: FR-Films-720p
description: >
  Profil Radarr 720p pour films sur trackers francophones (La Cale, Gemini, esprit C411).
  Même hiérarchie langue et teams que le 1080p ; bloque remux et AV1. Pas de pénalité Full Disc
  sur ce profil (contenu 720p issu surtout du WEB/TV, rarement ISO complet).
tags:
- 720p
- French
upgradesAllowed: true
minCustomFormatScore: 20000
upgradeUntilScore: 888888
minScoreIncrement: 1
custom_formats:
# --- Langue (priorité absolue sur tout le reste) ---
- name: FR-MULTI-VF2
  score: 60000
- name: FR-MULTI-VFF
  score: 50000
- name: FR-VF2
  score: 40000
- name: FR-VFF
  score: 30000
- name: FR-VOSTFR
  score: 10000

# --- Teams FR (bonus si le titre porte le nom du groupe) ---
- name: FR-Tier-01
  score: 1800
- name: FR-Tier-02
  score: 1700

# --- Repacks (versions corrigées) ---
- name: Repack3
  score: 8
- name: Repack2
  score: 7
- name: Repack1
  score: 6

# --- Exclusions ---
- name: FR-Blockers
  score: -999999
- name: Remux
  score: -999999
- name: AV1
  score: -999999

qualities:
- id: -2
  name: 720p Quality
  qualities:
  - id: 13
    name: Bluray-720p
  - id: 14
    name: WEBDL-720p
  - id: 15
    name: WEBRip-720p
upgrade_until:
  id: -2
  name: 720p Quality
language: any
