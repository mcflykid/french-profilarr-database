name: FR-MULTI-VF2
description: Détecte les releases annonçant à la fois MULTI ET un tag VF2, VFQ ou VOQ
  (inclut la variante québécoise « VOQ » visible chez QTZ et équivalents). Représente
  le pack audio multi-pistes avec variante Québec / seconde VF — cible de meilleure
  compatibilité linguistique (le plus haut score langue du système).
tags:
- Language
- French
conditions:
- name: MULTI
  negate: false
  pattern: FR-Regex-MULTI
  required: true
  type: release_title
- name: VF2
  negate: false
  pattern: FR-Regex-VF2
  required: true
  type: release_title
tests: []
