name: AAC
description: |-
  Détecte la présence du codec audio **AAC** dans le titre de release (indexeur).
  Le bloc de conditions suivant exclut l’activation si le titre announce en parallèle
  d’autres formats audio listés (« negate »), afin de ne scorer qu’une piste prédominante
  cohérente avec le parsing Servarr/Dictionarry d’origine.
tags:
- Audio
conditions:
- name: AAC
  negate: false
  pattern: AAC
  required: true
  type: release_title
- name: Not Dolby Digital
  negate: true
  pattern: Dolby Digital
  required: true
  type: release_title
- name: Not Dolby Digital +
  negate: true
  pattern: Dolby Digital +
  required: true
  type: release_title
- name: Not DTS
  negate: true
  pattern: DTS
  required: true
  type: release_title
- name: Not FLAC
  negate: true
  pattern: FLAC
  required: true
  type: release_title
- name: Not PCM
  negate: true
  pattern: PCM
  required: true
  type: release_title
- name: Not TrueHD
  negate: true
  pattern: TrueHD
  required: true
  type: release_title
tests: []
