name: PCM
description: |-
  Détecte le **PCM / LPCM non compressé** annoncé dans le titre audio. Mutualise avec des
  négations sur AAC, Dolby, DTS familles pour éviter un double-score audio lorsque plusieurs
  mentionnent différentes pistes contradictoirement sur une même ligne d’indexation.
