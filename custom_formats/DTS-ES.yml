name: DTS-ES
description: |-
  Détecte **DTS-ES** (extension surround matricielle) dans la release. Agrège exclusions vers les autres codecs
  du pack commun (DTS:X, Dolby, FLAC, AAC, TrueHD…) pour empêcher le cumul aberrant lorsque plusieurs badges
  s’entrechoquent dans le même titre indexer.
tags:
- Audio
conditions:
- name: DTS-ES
  negate: false
  pattern: DTS-ES
  required: true
  type: release_title
- name: Not AAC
  negate: true
  pattern: AAC
  required: true
  type: release_title
- name: Not Dolby Digital
  negate: true
  pattern: Dolby Digital
  required: true
  type: release_title
- name: Not Dolby Digital +
  negate: true
  pattern: Dolby Digital +
  required: true
  type: release_title
- name: Not DTS
  negate: true
  pattern: DTS Basic
  required: true
  type: release_title
- name: Not DTS-X
  negate: true
  pattern: DTS-X
  required: true
  type: release_title
- name: Not FLAC
  negate: true
  pattern: FLAC
  required: true
  type: release_title
- name: Not PCM
  negate: true
  pattern: PCM
  required: true
  type: release_title
- name: Not TrueHD
  negate: true
  pattern: TrueHD
  required: true
  type: release_title
tests: []
