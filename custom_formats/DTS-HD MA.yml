# ============================================================================
# Format personnalisé — DTS-HD Master Audio
# ----------------------------------------------------------------------------
# Couvre formes « DTS-HD MA » et certaines abréviations « DTS-HD » seules selon regex.
# ============================================================================
name: DTS-HD MA
description: >
  Détecte DTS-HD Master Audio ou mention DTS-HD compatible avec la regex liée. Bonus audio lossless
  côté DTS pour releases Bluray/UHD annoncées sur trackers FR.
tags: []
# Référence regex : le champ `pattern` doit pointer vers un nom présent dans `regex_patterns/`.
# `type: release_title` = analyse sur le titre d'annonce fourni par l'indexeur (La Cale / Gemini).
conditions:
  - name: DTS-HD MA
    type: release_title
    negate: false
    required: false
    pattern: DTS-HD MA Regex
# Tests : titres factices au format v1 (`id`, `input`, `expected`).
tests:
  - id: 1
    input: Film.2019.MULTI.VFF.UHD.2160p.HDR10Plus.DTS-HD.MA.7.1.x265-QTZ
    expected: true
  - id: 2
    input: Serie.S01E01.VOSTFR.BluRay.1080p.DTS-HD.h264-AMEN
    expected: true
  - id: 3
    input: Film.2024.MULTI.VFF.WEB-DL.1080p.AC3.5.1.x264-TFA
    expected: false
