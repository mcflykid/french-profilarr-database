name: HDR
description: >-
  Repère une mention **HDR** « fourre-tout » dans le titre quand elle n’est **pas** mieux précisée comme **HDR10**,
  **HDR10+**, pas plus signalée comme **SDR**, **PQ** isolé ou **HLG** (voir exclusions). Réduit le risque de double noter HDR
  plusieurs fois alors que Dolby Vision peut coexister sur d’autres CF suivant profil.
tags:
- Colour Grade
- HDR
conditions:
- name: HDR
  negate: false
  pattern: HDR
  required: true
  type: release_title
- name: Not SDR
  type: release_title
  required: true
  negate: true
  pattern: SDR
- name: Not PQ
  type: release_title
  required: true
  negate: true
  pattern: PQ
- name: Not HLG
  type: release_title
  required: true
  negate: true
  pattern: HLG
- name: Not HDR10
  negate: true
  pattern: HDR10
  required: true
  type: release_title
- name: Not HDR10+
  negate: true
  pattern: HDR10+
  required: true
  type: release_title
tests: []
