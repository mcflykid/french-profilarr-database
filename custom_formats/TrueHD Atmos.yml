# =============================================================================
# Custom format — TrueHD + Atmos (annonce titre)
# -----------------------------------------------------------------------------
# Détection textuelle ; combiner avec profils 4K / Any pour favoriser le HC.
# =============================================================================
name: TrueHD Atmos
description: >
  Détecte une annonce TrueHD Atmos (ou ordre inverse) dans le titre. Bonus audio pour releases UHD
  ou 1080p haut de gamme annoncées compatibles home-cinéma sur trackers FR.
tags: []
# « pattern » : nom de la regex (fichiers regex_patterns/) ; type release_title : analyse sur le titre d’annonce Radarr ou Sonarr (La Cale, Gemini, etc.).
conditions:
  - name: TrueHD Atmos
    type: release_title
    negate: false
    required: false
    pattern: TrueHD Atmos Regex
# Tests : titres factices, résultat attendu should_match (Profilarr / PCD).
tests:
  - title: Film.2021.MULTI.VFF.UHD.2160p.Bluray.TrueHD.Atmos.7.1.x265-TFA
    type: movie
    should_match: true
    description: TrueHD Atmos ordre naturel
  - title: Serie.S01E07.Atmos.TrueHD.WEB-DL.1080p.EAC3.h264-FW
    type: series
    should_match: true
    description: Ordre inverse Atmos / TrueHD
  - title: Film.2019.MULTI.VFF.WEB-DL.1080p.DDP5.1.h264-AMEN
    type: movie
    should_match: false
    description: Pas de mention TrueHD / Atmos
