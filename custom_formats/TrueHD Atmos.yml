# ============================================================================
# Format personnalisé — TrueHD + Atmos (annonce titre)
# ----------------------------------------------------------------------------
# Détection textuelle ; combiner avec profils 4K / Any pour favoriser le HC.
# ============================================================================
name: TrueHD Atmos
description: >
  Détecte une annonce TrueHD Atmos (ou ordre inverse) dans le titre. Bonus audio pour releases UHD
  ou 1080p haut de gamme annoncées compatibles home-cinéma sur trackers FR.
tags: []
# Référence regex : le champ `pattern` doit pointer vers un nom présent dans `regex_patterns/`.
# `type: release_title` = analyse sur le titre d'annonce fourni par l'indexeur (La Cale / Gemini).
conditions:
  - name: TrueHD Atmos
    type: release_title
    negate: false
    required: false
    pattern: TrueHD Atmos Regex
# Tests : titres factices au format v1 (`id`, `input`, `expected`).
tests:
  - id: 1
    input: Film.2021.MULTI.VFF.UHD.2160p.Bluray.TrueHD.Atmos.7.1.x265-TFA
    expected: true
  - id: 2
    input: Serie.S01E07.Atmos.TrueHD.WEB-DL.1080p.EAC3.h264-FW
    expected: true
  - id: 3
    input: Film.2019.MULTI.VFF.WEB-DL.1080p.DDP5.1.h264-AMEN
    expected: false
