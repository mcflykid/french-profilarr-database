name: FR-MULTI-VFF
description: Détecte les releases annonçant à la fois MULTI ET un tag FR hors VFQ/VF2/VOQ
  (VFF, TRUEFRENCH, VFI, VOF, VFB, VF générique). Le tag VOQ relève de FR-MULTI-VF2.
  Représente le pack audio FR multi-langues le plus courant sur la scène FR (préféré
  sur la VF mono-piste).
tags:
- Language
- French
conditions:
- name: MULTI
  negate: false
  pattern: FR-Regex-MULTI
  required: true
  type: release_title
- name: VFF
  negate: false
  pattern: FR-Regex-VFF
  required: true
  type: release_title
tests: []
