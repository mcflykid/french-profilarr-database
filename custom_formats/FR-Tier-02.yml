# ============================================================================
# Custom format — Bonus teams Tier 2
# ----------------------------------------------------------------------------
# Bonus inférieur au Tier 1 ; couvre scène et teams « solides » secondaires.
# ============================================================================
name: FR-Tier-02
description: >
  Bonus pour teams Tier 2 (regex FR-Tier-02). Utile quand deux releases ont même score langue et
  même type HDR/audio, mais proviennent de teams de réputation différente sur la scène FR.
tags: []
# Référence regex : le champ `pattern` doit pointer vers un nom présent dans `regex_patterns/`.
# `type: release_title` = analyse sur le titre d'annonce fourni par l'indexeur (La Cale / Gemini).
conditions:
  - name: Tier 02
    type: release_title
    negate: false
    required: false
    pattern: FR-Tier-02
# Tests : titres factices, résultat attendu should_match (Profilarr / PCD).
tests:
  - title: Film.2018.MULTI.VFF.WEB-DL.1080p.EAC3.5.1.h264-LOST
    type: movie
    should_match: true
    description: Scène / Tier 02 (LOST)
  - title: Serie.NO.S02E11.VOSTFR.WEBRip.720p.x264-HYPERION
    type: series
    should_match: true
    description: HYPERION explicite
  - title: Film.2024.VFF.UHD.2160p.DoVi.HDR10.DTS-HD.MA.7.1.x265-TFA
    type: movie
    should_match: false
    description: Groupe Tier 01 seulement (absent de la liste Tier 02)
