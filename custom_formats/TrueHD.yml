# ============================================================================
# Format personnalisé — TrueHD (sans exiger Atmos ici)
# ----------------------------------------------------------------------------
# Peut coexister avec TrueHD Atmos sur une même release (deux formats personnalisés).
# ============================================================================
name: TrueHD
description: >
  Détecte TrueHD dans le titre (y compris quand Atmos est aussi annoncé). Bonus audio lossless
  Dolby hors cas DTS-HD MA.
tags: []
# Référence regex : le champ `pattern` doit pointer vers un nom présent dans `regex_patterns/`.
# `type: release_title` = analyse sur le titre d'annonce fourni par l'indexeur (La Cale / Gemini).
conditions:
  - name: TrueHD
    type: release_title
    negate: false
    required: false
    pattern: TrueHD Regex
# Tests : titres factices au format v1 (`id`, `input`, `expected`).
tests:
  - id: 1
    input: Film.2020.MULTI.VFF.Bluray.1080p.TrueHD.7.1.Atmos.x264-TFA
    expected: true
  - id: 2
    input: Serie.S03E09.VOSTFR.WEB-DL.720p.TrueHD.5.1.x265-FW
    expected: true
  - id: 3
    input: Film.2022.MULTI.VFF.WEB.1080p.DTS-HD.MA.5.1.h264-OZEF
    expected: false
