# ============================================================================
# Format personnalisé — Repack niveau 2
# ----------------------------------------------------------------------------
# Bonus légèrement supérieur à Repack1 pour corrections « plus loin » (V3, etc.).
# ============================================================================
name: Repack2
description: >
  Détecte corrections niveau 2 (REPACK.2, V3…). Bonus juste au-dessus de Repack1 pour inciter à
  prendre la release la plus corrigée lorsque tout le reste est égal.
tags: []
# Référence regex : le champ `pattern` doit pointer vers un nom présent dans `regex_patterns/`.
# `type: release_title` = analyse sur le titre d'annonce fourni par l'indexeur (La Cale / Gemini).
conditions:
  - name: Repack2
    type: release_title
    negate: false
    required: false
    pattern: Repack2 Regex
# Tests : titres factices au format v1 (`id`, `input`, `expected`).
tests:
  - id: 1
    input: Film.2016.MULTI.VFF.WEB-DL.REPACK.2.1080p.h264-QTZ
    expected: true
  - id: 2
    input: Serie.S02E08.VOSTFR.BluRay.V3.DTS-HD.MA.5.1.x264-GKS
    expected: true
  - id: 3
    input: Film.2019.MULTI.VFF.DVDrip.REPACK.1080p.XviD-BOUBA
    expected: false
