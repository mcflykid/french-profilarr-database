# ============================================================================
# Format personnalisé — Full disc (ISO / BDMV / VIDEO_TS)
# ----------------------------------------------------------------------------
# Pénalité pour structures disque complètes non souhaitées en bibliothèque type Plex.
# ============================================================================
name: Full Disc
description: >
  Détecte ISO, BDMV ou VIDEO_TS dans le titre. Sert à éviter les packs disque complets inadaptés
  au renommage simple et souvent mal vus sur les trackers FR pour le stockage domestique.
tags: []
# Référence regex : le champ `pattern` doit pointer vers un nom présent dans `regex_patterns/`.
# `type: release_title` = analyse sur le titre d'annonce fourni par l'indexeur (La Cale / Gemini).
conditions:
  - name: Full Disc
    type: release_title
    negate: false
    required: false
    pattern: Full Disc Regex
# Tests : titres factices au format v1 (`id`, `input`, `expected`).
tests:
  - id: 1
    input: Film.2009.MULTI.VFF.COMPLETE.BLURAY.VIDEO_TS.DVD9-TLC
    expected: true
  - id: 2
    input: Jeu.Video.2011.MULTI.FULL.ISO.BluRay-LOST
    expected: true
  - id: 3
    input: Film.2024.MULTI.VFF.mkv.BDRip.1080p.x264-AMEN
    expected: false
