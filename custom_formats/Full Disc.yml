name: Full Disc
description: >-
  Indique une **image disque Blu-ray intacte ou ISO / structure complète** dans le titre (regex `Full Disc`).
  Mutualise exclusions **WEB-DL / WEBRip**, **Remux** et codecs **x264/x265 annoncés** pour distinguer véritable transport
  disque fichier-image vs encodes classiques indexer.
tags:
- Storage
conditions:
- name: Full Disc
  negate: false
  pattern: Full Disc
  required: true
  type: release_title
- name: Not WEB-DL
  negate: true
  required: true
  source: web_dl
  type: source
- name: Not WEBRip
  negate: true
  required: true
  source: webrip
  type: source
- name: Not Remux
  negate: true
  pattern: Remux
  required: true
  type: release_title
- name: Not x264
  negate: true
  pattern: x264
  required: true
  type: release_title
- name: Not x265
  negate: true
  pattern: x265
  required: true
  type: release_title
tests: []
