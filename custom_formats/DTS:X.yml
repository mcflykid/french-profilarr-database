# ============================================================================
# Format personnalisé — DTS:X
# ----------------------------------------------------------------------------
# Audio immersif annoncé ; complémentaire avec TrueHD Atmos selon les releases.
# ============================================================================
name: DTS:X
description: >
  Détecte DTS:X (variantes DTS-X / DTS.X) dans le titre. Bonus pour annonces audio immersif sur
  films et séries UHD/Bluray sur la scène francophone.
tags: []
# Référence regex : le champ `pattern` doit pointer vers un nom présent dans `regex_patterns/`.
# `type: release_title` = analyse sur le titre d'annonce fourni par l'indexeur (La Cale / Gemini).
conditions:
  - name: DTS:X
    type: release_title
    negate: false
    required: false
    pattern: DTS-X Regex
# Tests : titres factices au format v1 (`id`, `input`, `expected`).
tests:
  - id: 1
    input: Film.2023.MULTI.VFF.UHD.2160p.DoVi.HDR10Plus.DTS-X.7.1.x265-QTZ
    expected: true
  - id: 2
    input: Serie.S02E03.VOSTFR.WEB.1080p.DTS.X.5.1.h264-BOUBA
    expected: true
  - id: 3
    input: Film.2016.MULTI.VFF.BluRay.1080p.DTS-HD.MA.5.1.x264-GKS
    expected: false
