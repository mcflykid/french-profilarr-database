name: FR-VF2
description: Détecte la présence d'un tag VF2, VFQ ou VOQ dans le titre, sans exiger MULTI.
  Couvre les doublages québécois (VFQ, VOQ ex. releases QTZ) ou « second doublage français »
  (VF2). À combiner avec les scores de profil pour ajuster la politique VFQ/VOQ selon
  la cible (France vs Québec).
tags:
- Language
- French
conditions:
- name: VF2
  negate: false
  pattern: FR-Regex-VF2
  required: true
  type: release_title
tests: []
